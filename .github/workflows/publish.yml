name: Publish Extension and Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: '*.vsix'

      - name: Publish to VS Marketplace
        run: |
          npx @vscode/vsce publish --packagePath *.vsix 2>&1 | tee vsce_output.log || {
            if grep -q "already exists" vsce_output.log; then
              echo "Extension version already exists in VS Marketplace, continuing..."
              exit 0
            else
              exit 1
            fi
          }
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }} 2>&1 | tee ovsx_output.log || {
            if grep -i -q "already exists" ovsx_output.log || grep -i -q "already published" ovsx_output.log; then
              echo "Extension version already exists in Open VSX, continuing..."
              exit 0
            else
              exit 1
            fi
          }

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os-name: 'windows'
          - platform: 'ubuntu-22.04'
            os-name: 'linux'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'desktop-app/package-lock.json'

      - name: Install system dependencies (Linux only)
        if: matrix.os-name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop-app/src-tauri -> target'

      - name: Install Node dependencies
        run: |
          cd desktop-app
          npm ci

      - name: Build desktop app
        run: |
          cd desktop-app
          npm run build:release

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os-name }}
          path: |
            desktop-app/release/*

  create-release:
    name: Create GitHub Release
    needs: [publish-extension, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and check artifacts
        run: |
          mkdir release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -R release-assets

      - name: Generate Release Notes with Checksums
        id: release_notes
        run: |
          cat << 'EOF' > release-body.md
          ## Release Details
          
          Choose the file that matches how you want to install:
          - `*.vsix` : VS Code extension package for manual install.
          - `*portable.exe` : Windows portable desktop app. Download and run directly.
          - `*setup.exe` : Windows desktop installer.
          - `*.deb` : Linux installer for Debian, Ubuntu, and compatible distributions.
          
          ### Assets SHA-256 Checksums
          | File | SHA-256 Checksum |
          | --- | --- |
          EOF
          
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              sha256=$(sha256sum "$file" | cut -d' ' -f1)
              echo "| $file | \`$sha256\` |" >> ../release-body.md
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
